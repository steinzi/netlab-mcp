name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # create release + upload artifacts

jobs:
  release:
    name: build + attach artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      # PyPI publish is intentionally deferred; attach the artifacts to the GitHub release.
      - name: Create release if missing, then upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" dist/* --clobber
