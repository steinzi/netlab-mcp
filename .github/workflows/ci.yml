name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: offline tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # netlab SOURCE tree: required only by list_examples (no current test exercises it).
      # Cheap insurance + mirrors the documented dev setup. Safe to drop if it ever flakes.
      - name: Clone netlab source (examples for list_examples)
        run: git clone --depth 1 https://github.com/ipspace/netlab netlab

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Sanity — netlab binary resolves
        run: netlab version

      - name: Run offline + contract suite
        run: pytest -m "not docker" -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev]'
      - run: ruff check .
