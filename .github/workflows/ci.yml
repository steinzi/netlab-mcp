name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: offline tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # netlab SOURCE tree: list_examples (+ its MCP test) reads tests/integration from here;
      # the test skips gracefully if absent, so this is also cheap insurance.
      - name: Clone netlab source (examples for list_examples)
        run: git clone --depth 1 https://github.com/ipspace/netlab netlab

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Sanity — netlab binary resolves
        run: netlab version

      - name: Run offline + contract suite (with coverage)
        run: |
          pytest -m "not docker" -v \
            --cov=netlab_mcp --cov-report=term-missing --cov-report=xml

      - name: Coverage summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          try:
              rate = float(ET.parse("coverage.xml").getroot().get("line-rate", 0)) * 100
              print(f"### Coverage: {rate:.1f}% (py${{ matrix.python-version }})")
          except Exception as e:
              print(f"coverage summary unavailable: {e}")
          PY

  build:
    name: build & install verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: twine check
        run: twine check dist/*
      - name: Assert wheel ships schema.sql and no store/netlab leak
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          names = zipfile.ZipFile(glob.glob("dist/*.whl")[0]).namelist()
          assert any(n.endswith("netlab_mcp/store/schema.sql") for n in names), "schema.sql missing"
          leak = [n for n in names if n.startswith(("store/", "netlab/"))]
          assert not leak, f"unexpected files in wheel: {leak}"
          print("wheel OK:", len(names), "entries")
          PY
      - name: Install wheel in a clean venv + import smoke
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/pip install --upgrade pip
          /tmp/wheeltest/bin/pip install dist/*.whl
          /tmp/wheeltest/bin/python -c "import netlab_mcp; from netlab_mcp.server import main, mcp"
          test -x /tmp/wheeltest/bin/netlab-mcp && echo "console script present"

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev]'
      - run: ruff check .
