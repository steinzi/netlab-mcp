name: Lab validate (manual / nightly)

# The live lab path (docker + containerlab) is NOT run on every PR — image pulls
# (srlinux ~3GB) and deploy time make it too slow. Run it on demand or weekly.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"  # Sunday 02:00 UTC

permissions:
  contents: read

jobs:
  lab:
    name: validate_in_lab (srlinux + frr)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install netlab-mcp + ansible toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install 'ansible<=11.10' paramiko netmiko ansible-pylibssh ncclient netaddr
          ansible-galaxy collection install nokia.srlinux

      - name: Install containerlab
        run: bash -c "$(curl -sL https://get.containerlab.dev)"

      # netlab runs `sudo -E containerlab`; the SETENV tag is required for the -E flag.
      # If the runner blocks this, the lab probe degrades to verdict "unavailable".
      - name: Scoped passwordless sudo for containerlab
        run: |
          CLAB="$(command -v containerlab)"
          echo "$USER ALL=(root) NOPASSWD: SETENV: $CLAB" | sudo tee /etc/sudoers.d/netlab-clab
          sudo chmod 0440 /etc/sudoers.d/netlab-clab
          sudo visudo -cf /etc/sudoers.d/netlab-clab

      - name: Clone netlab source (examples)
        run: git clone --depth 1 https://github.com/ipspace/netlab netlab

      - name: Run docker-gated lab suite
        run: pytest -m docker -v

      - name: Upload lab logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lab-logs
          path: .work/**
          if-no-files-found: ignore
